<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrotroOS Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #121212; color: #FFFFFF; margin: 0; padding: 24px; }
    h1 { color: #F36F21; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
    .stat { background: #1E1E1E; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
    .stat b { font-size: 28px; display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: #E0E0E0; }
    input, button { padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: #1E1E1E; color: #FFFFFF; }
    button { background: #F36F21; border: none; font-weight: 700; cursor: pointer; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>TrotroOS Admin</h1>
  <p>Read-only stats via Supabase anon key. For write access use service role on a secure backend.</p>
  <div class="row">
    <input id="url" placeholder="Supabase URL" style="flex:1;min-width:240px" />
    <input id="key" placeholder="Anon key" style="flex:1;min-width:240px" type="password" />
    <button onclick="load()">Load stats</button>
  </div>
  <div class="grid">
    <div class="stat"><b id="trips">—</b>Trips</div>
    <div class="stat"><b id="mates">—</b>Mates</div>
    <div class="stat"><b id="reports">—</b>Open reports</div>
    <div class="stat"><b id="scheduled">—</b>Scheduled</div>
  </div>
  <h2>Recent trips</h2>
  <table><thead><tr><th>Route</th><th>Status</th><th>Seats</th><th>When</th></tr></thead><tbody id="tripRows"></tbody></table>
  <script>
    async function count(table, filter) {
      let q = `${document.getElementById('url').value.replace(/\/$/, '')}/rest/v1/${table}?select=id&limit=1`;
      if (filter) q += '&' + filter;
      const res = await fetch(q, { headers: { apikey: document.getElementById('key').value, Authorization: 'Bearer ' + document.getElementById('key').value, Prefer: 'count=exact' } });
      return res.headers.get('content-range')?.split('/')[1] ?? '0';
    }
    async function load() {
      const base = document.getElementById('url').value.replace(/\/$/, '');
      const key = document.getElementById('key').value;
      const headers = { apikey: key, Authorization: 'Bearer ' + key };
      document.getElementById('trips').textContent = await count('trips');
      document.getElementById('mates').textContent = await count('mate_profiles');
      document.getElementById('reports').textContent = await count('safety_reports', 'status=eq.open');
      document.getElementById('scheduled').textContent = await count('scheduled_demand', 'status=eq.active');
      const trips = await fetch(base + '/rest/v1/trips?select=route,status,available_seats,total_seats,created_at&order=created_at.desc&limit=15', { headers }).then(r => r.json());
      document.getElementById('tripRows').innerHTML = (trips || []).map(t => `<tr><td>${t.route}</td><td>${t.status}</td><td>${t.available_seats}/${t.total_seats}</td><td>${new Date(t.created_at).toLocaleString()}</td></tr>`).join('');
    }
  </script>
</body>
</html>
